services:
  - type: web
    name: appel-qr-secure
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: QR_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      # RENDER_EXTERNAL_URL est injecté automatiquement ; utilisé comme PUBLIC_URL
      - key: GEOFENCE_ENABLED
        value: "1"
      - key: SCHOOL_LATITUDE
        sync: false
      - key: SCHOOL_LONGITUDE
        sync: false
      - key: GEOFENCE_RADIUS_METERS
        value: "200"
