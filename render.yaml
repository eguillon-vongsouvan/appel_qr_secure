services:
  - type: web
    name: appel-qr-secure
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: QR_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      - key: GEOFENCE_ENABLED
        value: "1"
      - key: SCHOOL_LATITUDE
        sync: false
      - key: SCHOOL_LONGITUDE
        sync: false
      - key: GEOFENCE_RADIUS_METERS
        value: "150"
